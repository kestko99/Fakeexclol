<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <style>
        body { 
            margin: 50px; 
            font-family: Arial; 
            background: #1a1a1f;
            color: white;
        }
        .test-box {
            border: 3px solid #00ff88;
            padding: 20px;
            background: #2a2a35;

    <h1>Testing Wesky Exchange</h1>
    <div class="test-box">
        If you see a GREEN BORDER around this box, the styles are working!

</html>
